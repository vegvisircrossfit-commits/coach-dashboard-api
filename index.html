<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Coach Dashboard — Vegvisir CrossFit</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0D0E12; color: #F0EDE8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    button { font-family: inherit; }
    textarea, input { font-family: inherit; }
    textarea::placeholder, input::placeholder { color: rgba(255,255,255,0.25); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
  (function() {
    var e = React.createElement;
    var useState = React.useState;

    var PROXY = "https://coach-dashboard-api.onrender.com/wodify";
    var CHECK_IN_DAYS = 90;
    // Name of your Athlete Check-in appointment type in Wodify — adjust if different
    var CHECK_IN_SERVICE_NAME = "Athlete Check-in";

    function wFetch(path) {
      return fetch(PROXY + path).then(function(r) {
        if (!r.ok) throw new Error("API error " + r.status);
        return r.json();
      });
    }

    // ── Helpers ──────────────────────────────────────────────────────────────
    function needsCheckIn(d) {
      if (!d) return true;
      return (Date.now() - new Date(d).getTime()) / 86400000 > CHECK_IN_DAYS;
    }
    function daysAgo(d) {
      if (!d) return null;
      return Math.floor((Date.now() - new Date(d).getTime()) / 86400000);
    }
    function colorFor(n) {
      var c = ["#E8643A","#3A7BD5","#27AE8F","#9B59B6","#E74C3C","#F39C12","#16A085","#2980B9"];
      return c[Math.abs((n.charCodeAt(0)||0)+(n.charCodeAt(1)||0)) % c.length];
    }
    function initials(name) {
      return name.split(" ").map(function(n){return n[0];}).join("").slice(0,2).toUpperCase();
    }
    function todayStr() {
      return new Date().toISOString().split("T")[0];
    }

    // ── Avatar ────────────────────────────────────────────────────────────────
    function Avatar(props) {
      var a = props.athlete, sz = props.size||72, fs = props.fontSize||22;
      var s = useState(false); var imgErr = s[0], setErr = s[1];
      if (a.photo && !imgErr) {
        return e('div',{style:{width:sz,height:sz,borderRadius:'50%',overflow:'hidden',flexShrink:0,border:'2px solid '+a.color+'44',boxShadow:'0 0 0 4px '+a.color+'18'}},
          e('img',{src:a.photo,alt:a.name,onError:function(){setErr(true);},style:{width:'100%',height:'100%',objectFit:'cover'}})
        );
      }
      return e('div',{style:{width:sz,height:sz,borderRadius:'50%',background:'linear-gradient(135deg,'+a.color+'cc,'+a.color+'66)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:fs,fontWeight:'700',color:'#fff',border:'2px solid '+a.color+'44',boxShadow:'0 0 0 4px '+a.color+'18',flexShrink:0}},
        initials(a.name)
      );
    }

    // ── Athlete Card ──────────────────────────────────────────────────────────
    function Card(props) {
      var a = props.athlete, onClick = props.onClick;
      var flagged = needsCheckIn(a.lastCheckIn);
      return e('button',{
        onClick:function(){onClick(a);},
        style:{background:'rgba(255,255,255,0.04)',border:flagged?'1px solid rgba(251,191,36,0.4)':'1px solid rgba(255,255,255,0.08)',borderRadius:'18px',padding:'20px 14px',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'10px',position:'relative',overflow:'hidden',textAlign:'center',width:'100%'}
      },
        e('div',{style:{position:'absolute',top:'-20px',right:'-20px',width:'70px',height:'70px',borderRadius:'50%',background:flagged?'#FBBF24':a.color,opacity:0.12,filter:'blur(18px)',pointerEvents:'none'}}),
        flagged && e('div',{style:{position:'absolute',top:'9px',right:'9px',background:'#FBBF24',color:'#000',fontSize:'8px',fontWeight:'800',borderRadius:'5px',padding:'2px 6px'}},'CHECK-IN'),
        e('div',{style:{position:'relative'}},
          e(Avatar,{athlete:a,size:64,fontSize:19}),
          flagged && e('div',{style:{position:'absolute',bottom:-2,right:-2,width:'17px',height:'17px',borderRadius:'50%',background:'#FBBF24',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'9px',fontWeight:'800',border:'2px solid #0D0E12',color:'#000'}},'!')
        ),
        e('div',null,
          e('div',{style:{color:'#F0EDE8',fontSize:'13px',fontWeight:'600',lineHeight:1.3}},a.name),
          a.injury && e('div',{style:{marginTop:'4px',fontSize:'10px',color:a.color,background:a.color+'18',borderRadius:'20px',padding:'2px 8px',display:'inline-block',lineHeight:1.5}},a.injury.split('—')[0].trim())
        ),
        e('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.22)'}},'tap to view')
      );
    }

    // ── Modal ─────────────────────────────────────────────────────────────────
    function Modal(props) {
      var a = props.athlete, onClose = props.onClose, onSave = props.onSaveNote;
      var ns = useState(''); var note = ns[0], setNote = ns[1];
      var ss = useState(false); var saved = ss[0], setSaved = ss[1];
      var flagged = needsCheckIn(a.lastCheckIn);
      var ds = daysAgo(a.lastCheckIn);

      function save() {
        if (!note.trim()) return;
        onSave(a.id, note.trim());
        setNote('');
        setSaved(true);
        setTimeout(function(){setSaved(false);}, 2500);
      }

      return e('div',{onClick:onClose,style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.82)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}},
        e('div',{onClick:function(ev){ev.stopPropagation();},style:{background:'#14151A',borderRadius:'22px',border:flagged?'1px solid rgba(251,191,36,0.3)':'1px solid '+a.color+'33',boxShadow:'0 32px 64px rgba(0,0,0,0.6)',width:'100%',maxWidth:'480px',maxHeight:'92vh',overflowY:'auto'}},

          // Header
          e('div',{style:{padding:'20px 20px 16px',background:flagged?'linear-gradient(180deg,rgba(251,191,36,0.08) 0%,transparent 100%)':'linear-gradient(180deg,'+a.color+'10 0%,transparent 100%)',borderRadius:'22px 22px 0 0'}},
            flagged && e('div',{style:{background:'rgba(251,191,36,0.12)',border:'1px solid rgba(251,191,36,0.28)',borderRadius:'10px',padding:'9px 12px',marginBottom:'14px',display:'flex',alignItems:'center',gap:'9px'}},
              e('span',{style:{fontSize:'15px'}},'⚠️'),
              e('div',null,
                e('div',{style:{color:'#FBBF24',fontSize:'12px',fontWeight:'700'}},'Athlete Check-in Overdue'),
                e('div',{style:{color:'rgba(251,191,36,0.65)',fontSize:'11px',marginTop:'2px'}},
                  a.lastCheckIn ? 'Last check-in was '+ds+' days ago — over 90-day window' : 'No Athlete Check-in appointment on record'
                )
              )
            ),
            e('div',{style:{display:'flex',alignItems:'center',gap:'13px'}},
              e(Avatar,{athlete:a,size:54,fontSize:16}),
              e('div',{style:{flex:1}},
                e('div',{style:{color:'#F0EDE8',fontSize:'18px',fontWeight:'700'}},a.name),
                a.injury && e('div',{style:{color:a.color,fontSize:'11px',marginTop:'2px'}},a.injury)
              ),
              e('button',{onClick:onClose,style:{background:'rgba(255,255,255,0.08)',border:'none',borderRadius:'50%',width:'32px',height:'32px',color:'rgba(255,255,255,0.5)',cursor:'pointer',fontSize:'20px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,lineHeight:1}},'×')
            )
          ),

          // Body
          e('div',{style:{padding:'0 20px 24px',display:'flex',flexDirection:'column',gap:'16px'}},

            // Notes field from Wodify profile
            a.injury && e('div',null,
              e('div',{style:{color:'rgba(255,255,255,0.45)',fontWeight:'700',fontSize:'11px',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:'7px'}},'📋  Athlete Notes'),
              e('div',{style:{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:'11px',padding:'12px 14px',color:'rgba(255,255,255,0.75)',fontSize:'13px',lineHeight:1.6}},a.injury)
            ),

            // Tags
            a.tags && a.tags.length > 0 && e('div',null,
              e('div',{style:{color:'rgba(255,255,255,0.45)',fontWeight:'700',fontSize:'11px',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:'7px'}},'🏷  Tags'),
              e('div',{style:{display:'flex',flexWrap:'wrap',gap:'6px'}},
                a.tags.map(function(t,i){
                  return e('div',{key:i,style:{background:a.color+'18',border:'1px solid '+a.color+'33',borderRadius:'20px',padding:'3px 10px',color:a.color,fontSize:'12px'}},t);
                })
              )
            ),

            e('div',{style:{height:'1px',background:'rgba(255,255,255,0.06)'}}),

            // Last coach note (stored in app)
            e('div',null,
              e('div',{style:{color:'rgba(255,255,255,0.45)',fontWeight:'700',fontSize:'11px',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:'7px'}},'💬  Last Coach Note'),
              a.lastNote
                ? e('div',{style:{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:'11px',padding:'12px 14px'}},
                    e('div',{style:{color:a.color,fontSize:'10px',marginBottom:'5px'}},a.lastNote.date),
                    e('div',{style:{color:'rgba(255,255,255,0.8)',fontSize:'13px',lineHeight:1.6}},a.lastNote.text)
                  )
                : e('div',{style:{padding:'12px 14px',color:'rgba(255,255,255,0.22)',fontSize:'13px',background:'rgba(255,255,255,0.02)',borderRadius:'11px',border:'1px dashed rgba(255,255,255,0.07)'}},'No notes yet.')
            ),

            // Add note
            e('div',{style:{background:a.color+'0A',border:'1px solid '+a.color+'22',borderRadius:'13px',padding:'14px'}},
              e('div',{style:{color:a.color,fontSize:'10px',fontWeight:'700',marginBottom:'8px',textTransform:'uppercase',letterSpacing:'0.08em'}},'+ Post-Class Note'),
              e('textarea',{value:note,onChange:function(ev){setNote(ev.target.value);},placeholder:'How did they move today? Any pain, wins, or modifications needed next time...',rows:3,style:{width:'100%',background:'rgba(0,0,0,0.3)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:'8px',padding:'10px 12px',color:'#F0EDE8',fontSize:'13px',resize:'vertical',outline:'none',lineHeight:1.6,boxSizing:'border-box'}}),
              e('button',{onClick:save,style:{marginTop:'8px',background:saved?'#22C55E':a.color,border:'none',borderRadius:'8px',padding:'11px',color:'#fff',fontSize:'13px',fontWeight:'700',cursor:'pointer',width:'100%'}},
                saved ? '✓ Note Saved' : 'Save Note'
              )
            )
          )
        )
      );
    }

    // ── Setup Screen ──────────────────────────────────────────────────────────
    function Setup(props) {
      var onConnect = props.onConnect;
      var ls = useState(false); var loading = ls[0], setLoading = ls[1];
      var es = useState(''); var err = es[0], setErr = es[1];

      function connect() {
        setLoading(true); setErr('');
        fetch('https://coach-dashboard-api.onrender.com/health')
          .then(function(r){ if(!r.ok) throw new Error(''); return r.json(); })
          .then(function(){ onConnect(true); })
          .catch(function(){ setErr('Could not reach the server. Wait 30 seconds and try again.'); setLoading(false); });
      }

      return e('div',{style:{minHeight:'100vh',background:'#0D0E12',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px'}},
        e('div',{style:{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'22px',padding:'34px',width:'100%',maxWidth:'340px',textAlign:'center'}},
          e('div',{style:{width:'60px',height:'60px',borderRadius:'16px',background:'linear-gradient(135deg,#3A7BD5,#27AE8F)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'26px',margin:'0 auto 20px'}},'🏋️'),
          e('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.3)',letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:'5px'}},'Vegvisir CrossFit'),
          e('div',{style:{fontSize:'21px',fontWeight:'700',color:'#F0EDE8',marginBottom:'9px'}},'Coach Dashboard'),
          e('div',{style:{fontSize:'13px',color:'rgba(255,255,255,0.38)',lineHeight:1.6,marginBottom:'24px'}},"Connect to Wodify to load today's class roster."),
          err && e('div',{style:{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.22)',borderRadius:'9px',padding:'11px',marginBottom:'13px',color:'#FCA5A5',fontSize:'12px',textAlign:'left',lineHeight:1.6}},err),
          e('div',{style:{display:'flex',flexDirection:'column',gap:'9px'}},
            e('button',{onClick:connect,disabled:loading,style:{background:'linear-gradient(135deg,#3A7BD5,#2563EB)',border:'none',borderRadius:'11px',padding:'13px',color:'#fff',fontSize:'14px',fontWeight:'700',cursor:loading?'wait':'pointer',opacity:loading?0.7:1,boxShadow:'0 4px 18px rgba(58,123,213,0.35)'}},
              loading ? 'Connecting...' : 'Connect to Wodify'
            ),
            e('button',{onClick:function(){onConnect(false);},style:{background:'transparent',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'11px',padding:'12px',color:'rgba(255,255,255,0.38)',fontSize:'13px',cursor:'pointer'}},
              'Use demo data'
            )
          )
        )
      );
    }

    // ── Class Selector ────────────────────────────────────────────────────────
    function ClassPicker(props) {
      var classes = props.classes, onSelect = props.onSelect;
      return e('div',{style:{minHeight:'100vh',background:'#0D0E12',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px'}},
        e('div',{style:{width:'100%',maxWidth:'440px'}},
          e('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.3)',letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:'7px'}},"Today's Schedule"),
          e('div',{style:{fontSize:'21px',fontWeight:'700',color:'#F0EDE8',marginBottom:'18px'}},'Select a Class'),
          e('div',{style:{display:'flex',flexDirection:'column',gap:'9px'}},
            classes.map(function(cls){
              var time = cls.start_time ? cls.start_time.slice(0,5) : '';
              var name = cls.program_name || cls.name || 'Class';
              var count = (cls.reserved || 0);
              return e('button',{key:cls.id,onClick:function(){onSelect(cls);},style:{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:'14px',padding:'17px 18px',display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer',textAlign:'left',width:'100%'}},
                e('div',null,
                  e('div',{style:{color:'#F0EDE8',fontSize:'15px',fontWeight:'600'}},name),
                  e('div',{style:{color:'rgba(255,255,255,0.38)',fontSize:'12px',marginTop:'2px'}},time+(count?' · '+count+' reserved':''))
                ),
                e('span',{style:{color:'rgba(255,255,255,0.28)',fontSize:'22px',lineHeight:1}},'›')
              );
            })
          )
        )
      );
    }

    // ── Main App ──────────────────────────────────────────────────────────────
    function App() {
      var sc = useState('setup'); var screen = sc[0], setScreen = sc[1];
      var lv = useState(false); var isLive = lv[0], setIsLive = lv[1];
      var cl = useState([]); var classes = cl[0], setClasses = cl[1];
      var sl = useState(null); var selClass = sl[0], setSelClass = sl[1];
      var at = useState([]); var athletes = at[0], setAthletes = at[1];
      var ld = useState(false); var loading = ld[0], setLoading = ld[1];
      var ms = useState(null); var modal = ms[0], setModal = ms[1];
      var sr = useState(''); var search = sr[0], setSearch = sr[1];
      var ff = useState(false); var filterFlag = ff[0], setFilterFlag = ff[1];
      // Store coach notes locally keyed by client id
      var nts = useState({}); var notes = nts[0], setNotes = nts[1];

      function loadClasses(live) {
        if (!live) {
          // Demo mode
          setClasses([
            {id:'1',name:'CrossFit: 6:00 AM',program_name:'CrossFit',start_time:'06:00',reserved:6},
            {id:'2',name:'CrossFit: 9:00 AM',program_name:'CrossFit',start_time:'09:00',reserved:4},
            {id:'3',name:'Open Gym',program_name:'Open Gym',start_time:'11:00',reserved:8},
          ]);
          setScreen('classes');
          return;
        }
        setLoading(true);
        var today = todayStr();
        // Get today's classes
        wFetch('/classes?start_date='+today+'&end_date='+today)
          .then(function(d){
            var list = d.classes || [];
            // Filter out cancelled classes
            list = list.filter(function(c){ return !c.is_cancelled; });
            setClasses(list.length ? list : [{id:'none',name:'No classes today',program_name:'',start_time:'',reserved:0}]);
          })
          .catch(function(err){ console.error(err); setClasses([]); })
          .finally(function(){ setLoading(false); setScreen('classes'); });
      }

      function loadAthletes(cls) {
        setSelClass(cls); setLoading(true);
        if (!isLive) {
          // Demo athletes
          setAthletes([
            {id:'1',name:'Sarah Chen',photo:null,color:'#E8643A',injury:'Left shoulder impingement — no kipping, keep overhead light',tags:['Injury','Modified'],lastCheckIn:new Date(Date.now()-95*86400000)},
            {id:'2',name:'Marcus Webb',photo:null,color:'#3A7BD5',injury:'Post ACL surgery (6 mo) — box squats only, sub bike for running',tags:['Injury'],lastCheckIn:new Date(Date.now()-30*86400000)},
            {id:'3',name:'Priya Nair',photo:null,color:'#27AE8F',injury:'Disc herniation L4-L5 — no heavy deadlifts, brace core aggressively',tags:['Injury','Modified'],lastCheckIn:null},
            {id:'4',name:'Derek Osei',photo:null,color:'#9B59B6',injury:'Wrist sprain (right) — use wrist wraps, no front rack',tags:[],lastCheckIn:new Date(Date.now()-45*86400000)},
            {id:'5',name:'Jess Fontaine',photo:null,color:'#E74C3C',injury:'New member — prioritize mechanics, scale volume 20-30%',tags:['New Member'],lastCheckIn:new Date(Date.now()-10*86400000)},
            {id:'6',name:'Tom Hartley',photo:null,color:'#F39C12',injury:'Rotator cuff tightness — band pull-aparts every warm-up, no behind neck',tags:[],lastCheckIn:new Date(Date.now()-100*86400000)},
          ]);
          setScreen('roster');
          setLoading(false);
          return;
        }

        // Get reservations for this class
        wFetch('/classes/reservations/clients/search?q='+cls.id+'&page_size=100')
          .then(function(rd){
            var reservations = rd.client_class_reservations || [];
            // Fetch client profiles in parallel
            return Promise.all(reservations.map(function(r){
              var clientId = r.client_id;
              var name = r.client || 'Unknown';
              return wFetch('/clients/'+clientId)
                .then(function(c){
                  return {
                    id: String(clientId),
                    name: (c.first_name||'') + ' ' + (c.last_name||''),
                    photo: null, // Wodify API doesn't expose photo URLs
                    color: colorFor(name),
                    injury: c.notes || '',
                    tags: c.tags || [],
                    lastCheckIn: null, // Will check appointments separately
                    member_since: c.member_since,
                  };
                })
                .catch(function(){
                  return {id:String(clientId),name:name,photo:null,color:colorFor(name),injury:'',tags:[],lastCheckIn:null};
                });
            }));
          })
          .then(function(list){
            // Now check appointment bookings for Athlete Check-in for each client
            return Promise.all(list.map(function(athlete){
              return wFetch('/clients/'+athlete.id+'/bookings/search?q='+encodeURIComponent(CHECK_IN_SERVICE_NAME)+'&page_size=5')
                .then(function(bd){
                  var bookings = bd.client_appointment_bookings || [];
                  // Find most recent completed one
                  var completed = bookings.filter(function(b){ return b.status === 'SignedIn' || b.status === 'Completed'; });
                  if (completed.length > 0) {
                    completed.sort(function(a,b){ return new Date(b.local_start_datetime) - new Date(a.local_start_datetime); });
                    athlete.lastCheckIn = new Date(completed[0].local_start_datetime);
                  }
                  return athlete;
                })
                .catch(function(){ return athlete; });
            }));
          })
          .then(function(list){ setAthletes(list); })
          .catch(function(err){ console.error(err); setAthletes([]); })
          .finally(function(){ setLoading(false); setScreen('roster'); });
      }

      function handleConnect(live) { setIsLive(live); loadClasses(live); }

      function saveNote(id, text) {
        var today = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
        var newNote = {date:today,text:text};
        setNotes(function(prev){ var n=Object.assign({},prev); n[id]=newNote; return n; });
        setModal(function(prev){ return prev&&prev.id===id?Object.assign({},prev,{lastNote:newNote}):prev; });
      }

      // Merge stored notes into athletes
      var athletesWithNotes = athletes.map(function(a){
        return Object.assign({},a,{lastNote: notes[a.id] || null});
      });

      var filtered = athletesWithNotes
        .filter(function(a){return a.name.toLowerCase().indexOf(search.toLowerCase())!==-1;})
        .filter(function(a){return filterFlag?needsCheckIn(a.lastCheckIn):true;});
      var flagCount = athletesWithNotes.filter(function(a){return needsCheckIn(a.lastCheckIn);}).length;

      if (screen==='setup') return e(Setup,{onConnect:handleConnect});
      if (screen==='classes') return loading
        ? e('div',{style:{minHeight:'100vh',background:'#0D0E12',display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(255,255,255,0.35)'}},'Loading classes...')
        : e(ClassPicker,{classes:classes,onSelect:loadAthletes});

      return e('div',{style:{minHeight:'100vh',background:'#0D0E12',color:'#F0EDE8'}},

        // Top bar
        e('div',{style:{borderBottom:'1px solid rgba(255,255,255,0.06)',padding:'14px 18px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'9px'}},
          e('div',{style:{display:'flex',alignItems:'center',gap:'11px'}},
            e('button',{onClick:function(){setScreen('classes');setAthletes([]);},style:{background:'rgba(255,255,255,0.06)',border:'none',borderRadius:'7px',padding:'6px 11px',color:'rgba(255,255,255,0.45)',cursor:'pointer',fontSize:'12px'}},'← Back'),
            e('div',null,
              e('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.3)',textTransform:'uppercase',letterSpacing:'0.08em'}},
                (selClass&&selClass.start_time?selClass.start_time.slice(0,5)+' · ':'')+new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})
              ),
              e('div',{style:{fontSize:'16px',fontWeight:'700'}},selClass?(selClass.program_name||selClass.name):'Class Roster')
            )
          ),
          e('div',{style:{display:'flex',alignItems:'center',gap:'7px',flexWrap:'wrap'}},
            flagCount>0 && e('button',{onClick:function(){setFilterFlag(function(f){return !f;});},style:{background:filterFlag?'#FBBF24':'rgba(251,191,36,0.1)',border:'1px solid rgba(251,191,36,0.28)',borderRadius:'18px',padding:'5px 11px',color:filterFlag?'#000':'#FBBF24',fontSize:'11px',fontWeight:'700',cursor:'pointer'}},'⚠ '+flagCount+' overdue'),
            e('div',{style:{background:'rgba(255,255,255,0.05)',borderRadius:'18px',padding:'5px 11px',fontSize:'11px',color:'rgba(255,255,255,0.45)'}},athletes.length+' athletes'),
            e('div',{style:{display:'flex',alignItems:'center',gap:'5px',background:isLive?'rgba(34,197,94,0.08)':'rgba(255,255,255,0.04)',border:'1px solid '+(isLive?'rgba(34,197,94,0.22)':'rgba(255,255,255,0.07)'),borderRadius:'18px',padding:'5px 11px',fontSize:'11px',color:isLive?'#22C55E':'rgba(255,255,255,0.28)'}},
              e('span',{style:{width:'5px',height:'5px',borderRadius:'50%',background:isLive?'#22C55E':'#444',display:'inline-block'}}),
              isLive?'Wodify live':'Demo'
            )
          )
        ),

        // Search
        e('div',{style:{padding:'14px 18px 0'}},
          e('input',{value:search,onChange:function(ev){setSearch(ev.target.value);},placeholder:'Search athletes...',style:{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:'9px',padding:'9px 13px',width:'100%',maxWidth:'280px',color:'#F0EDE8',fontSize:'13px',outline:'none'}})
        ),

        // Grid
        loading
          ? e('div',{style:{padding:'60px',textAlign:'center',color:'rgba(255,255,255,0.28)'}},'Loading athletes...')
          : e('div',{style:{padding:'14px 18px 40px',display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(136px,1fr))',gap:'11px'}},
              filtered.length
                ? filtered.map(function(a){return e(Card,{key:a.id,athlete:a,onClick:function(athlete){ setModal(Object.assign({},athlete,{lastNote:notes[athlete.id]||null})); }});})
                : e('div',{style:{gridColumn:'1/-1',textAlign:'center',padding:'48px',color:'rgba(255,255,255,0.22)'}},'No athletes found.')
            ),

        modal && e(Modal,{athlete:modal,onClose:function(){setModal(null);},onSaveNote:saveNote})
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  })();
  </script>
</body>
</html>
