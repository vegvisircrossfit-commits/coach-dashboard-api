<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vegvisir CrossFit — Staff Hub</title>
<link rel="preconnect" href="https://fonts.cdnfonts.com" />
<link href="https://fonts.cdnfonts.com/css/glacial-indifference-2" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0F171F; color: #EAEFF3; font-family: 'Glacial Indifference', 'Montserrat', sans-serif; height: 100vh; overflow: hidden; }
  #root { height: 100vh; display: flex; flex-direction: column; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: #16222E; }
  ::-webkit-scrollbar-thumb { background: #3E6E8E; border-radius: 2px; }
  input, textarea, select { background: #1C2A38; border: 1px solid #2A3A49; color: #EAEFF3; border-radius: 4px; padding: 8px 12px; outline: none; font-family: 'Glacial Indifference', 'Montserrat', sans-serif; font-size: 13px; }
  input:focus, textarea:focus, select:focus { border-color: #3E6E8E; }
  input[type=range] { -webkit-appearance: none; width: 100%; height: 3px; background: #2A3A49; border-radius: 2px; padding: 0; border: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #3E6E8E; cursor: pointer; }
  .btn { cursor: pointer; border: none; transition: all 0.15s ease; font-family: 'Glacial Indifference', 'Montserrat', sans-serif; }
  .btn:hover { opacity: 0.85; }
  .card { transition: border-color 0.15s; }
  .card:hover { border-color: #3E6E8E !important; }
  .fade-in { animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 700px) { .hide-mobile { display: none !important; } }
</style>
</head>
<body>
<div id="root"></div>
<script>
(function() {
  var React = window.React;
  var ReactDOM = window.ReactDOM;
  var XLSX = window.XLSX;
  var h = React.createElement;
  var useState = React.useState;
  var useEffect = React.useEffect;
  var useRef = React.useRef;
  var useCallback = React.useCallback;
  var useMemo = React.useMemo;

  var storage = {
    get: function(key) {
      try { var v = localStorage.getItem(key); return Promise.resolve(v ? { value: v } : null); }
      catch(e) { return Promise.resolve(null); }
    },
    set: function(key, value) {
      try { localStorage.setItem(key, value); return Promise.resolve({ value: value }); }
      catch(e) { return Promise.resolve(null); }
    }
  };

  var C = {
    accent: '#3E6E8E', accentHi: '#5A9ABF', navy: '#16222E', navy2: '#1C2A38',
    navy3: '#243545', line: '#2A3A49', bg: '#0F171F', text: '#EAEFF3',
    textDim: '#8A9AA8', textFaint: '#566673', gold: '#C9A84C', green: '#4F9D8C', purple: '#6B5B95'
  };

  // ══════════════════════════════════════════════════════
  // WOD SEARCH
  // ══════════════════════════════════════════════════════

  var SAMPLE_WORKOUTS = [
    { id:1, name:"Fran", duration:7, movements:["Thruster","Pull-Up"], weightMin:65, weightMax:95, type:"For Time", description:"21-15-9: Thrusters, Pull-ups" },
    { id:2, name:"Murph", duration:60, movements:["Running","Pull-Up","Push-Up","Air Squat"], weightMin:0, weightMax:0, type:"For Time", description:"1 mile run, 100 pull-ups, 200 push-ups, 300 squats, 1 mile run" },
    { id:3, name:"Grace", duration:5, movements:["Clean and Jerk"], weightMin:95, weightMax:135, type:"For Time", description:"30 Clean & Jerks" },
    { id:4, name:"Helen", duration:12, movements:["Running","Kettlebell Swing","Pull-Up"], weightMin:35, weightMax:53, type:"For Time", description:"3 rounds: 400m run, 21 KB swings, 12 pull-ups" },
    { id:5, name:"DT", duration:15, movements:["Deadlift","Hang Power Clean","Push Jerk"], weightMin:105, weightMax:155, type:"For Time", description:"5 rounds: 12 deadlifts, 9 hang power cleans, 6 push jerks" },
    { id:6, name:"Cindy", duration:20, movements:["Pull-Up","Push-Up","Air Squat"], weightMin:0, weightMax:0, type:"AMRAP", description:"20 min AMRAP: 5 pull-ups, 10 push-ups, 15 squats" },
    { id:7, name:"Annie", duration:10, movements:["Double-Under","Sit-Up"], weightMin:0, weightMax:0, type:"For Time", description:"50-40-30-20-10: Double-Unders, Sit-ups" },
    { id:8, name:"Karen", duration:15, movements:["Wall Ball"], weightMin:14, weightMax:20, type:"For Time", description:"150 Wall Balls" },
  ];

  var WOD_KEY = 'crossfit-workouts-v1';
  var BUCKETS = [
    { key:'sprint', label:'Sprint', sub:'< 10 min', test:function(d){return d>0&&d<10;} },
    { key:'medium', label:'Medium', sub:'10–17 min', test:function(d){return d>=10&&d<=17;} },
    { key:'long', label:'Long', sub:'18+ min', test:function(d){return d>=18;} }
  ];
  var TYPE_COLORS = { 'For Time':{bg:C.accent,text:'#fff'}, AMRAP:{bg:C.green,text:'#fff'}, EMOM:{bg:C.purple,text:'#fff'} };

  var MOVE_LIST = [
    "Chest-to-Bar Pull-Up","Toes-to-Bar","Handstand Push-Up","Handstand Walk","Squat Snatch","Power Snatch",
    "Hang Snatch","Squat Clean","Hang Power Clean","Power Clean","Hang Clean","Clean and Jerk",
    "Overhead Squat","Front Squat","Back Squat","Air Squat","Goblet Squat","Kettlebell Swing",
    "Shoulder to Overhead","Push Press","Push Jerk","Split Jerk","Strict Press","Bench Press",
    "Wall Ball","Wall Walk","Box Jump","Box Step-Up","Rope Climb","Double-Under","Devil Press",
    "Renegade Row","Bent Over Row","Dumbbell Row","Ring Row","Farmers Carry","Turkish Get-Up",
    "Assault Bike","Slam Ball","Thruster","Pull-Up","Push-Up","Sit-Up","Deadlift","Sprint",
    "Burpee","Snatch","Clean","Jerk","Muscle-Up","Ring Dip","Lunge","Pistol","GHD","Row","Run","Bike","Ski"
  ].sort(function(a,b){return b.length-a.length;});

  var MOVE_CANON = { "Run":"Running","Row":"Rowing","Echo Bike":"Assault Bike","Clean & Jerk":"Clean and Jerk" };

  function makeBoundaryRegex(phrase) {
    var esc = phrase.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return new RegExp('(^|[^a-z])'+esc+'(s|es|ing|ning|ping|ging)?(?![a-z])','i');
  }
  var MOVE_REGEX = MOVE_LIST.map(function(mv){ return [mv, makeBoundaryRegex(mv.toLowerCase())]; });

  function extractMovements(body) {
    var low = body.toLowerCase(); var found = []; var used = [];
    for (var i=0; i<MOVE_REGEX.length; i++) {
      var mv = MOVE_REGEX[i][0]; var rx = MOVE_REGEX[i][1]; var lm = mv.toLowerCase();
      if (!rx.test(low)) continue;
      var insideLonger = MOVE_REGEX.some(function(pair){ return pair[0].length > mv.length && pair[0].toLowerCase().includes(lm) && pair[1].test(low); });
      if (insideLonger) continue;
      if (used.some(function(u){return u.includes(lm);})) continue;
      used.push(lm); found.push(MOVE_CANON[mv]||mv);
    }
    return [...new Set(found)];
  }

  function parseNum(v){ var n=parseInt(v); return isNaN(n)?0:n; }
  function uid(){ return Date.now()+Math.random(); }

  function parseWodifyDetail(detail, dateStr) {
    if (!detail) return null;
    var text = String(detail).replace(/&amp;/g,'&').replace(/\\n/g,'\n');
    var re = /([A-Z0-9][^\n(]{1,60}?)\s*\(([^)]*(?:AMRAP|Time|Rounds|EMOM|Reps|Load)[^)]*)\)/g;
    var m, chosen=null, name='', typ='';
    while ((m=re.exec(text))!==null) {
      var n=m[1].trim();
      if (/warm.?up|accessory|cool.?down|checkmark/i.test(n)) continue;
      chosen=m; name=n; typ=m[2].trim(); break;
    }
    if (!chosen) return null;
    name=name.replace(/\s*Rx$/i,'').trim();
    var type='For Time';
    if (/AMRAP/i.test(typ)) type='AMRAP';
    else if (/EMOM/i.test(typ)) type='EMOM';
    var after=text.slice(chosen.index+chosen[0].length);
    var WOD_INT=/^(?:for time|amrap|emom|rounds?|rest|then|time cap|score|notes?|rx|scaled?)/i;
    var lines=after.split('\n'); var cutIdx=-1; var acc=0;
    for (var li=0;li<lines.length;li++) {
      var ln=lines[li].trim();
      var hdr=ln.match(/^([A-Z][A-Za-z]+(?:[ &\/-][A-Za-z]+){0,3})\s*:/);
      if (li>0&&hdr&&!/\d/.test(hdr[1])&&!WOD_INT.test(hdr[1])){cutIdx=acc;break;}
      acc+=lines[li].length+1;
    }
    if (cutIdx>=0) after=after.slice(0,cutIdx);
    var nb=/\n[^\n(]{1,60}\([^)]*(?:No Measure|Checkmark|Weight|Reps|Rounds|Time|AMRAP|EMOM|Load)[^)]*\)/i.exec(after);
    if (nb) after=after.slice(0,nb.index);
    var body=after.split(/RPE:|Goal |Sweat:|Post WOD/)[0];
    var duration=0;
    var durSrcs=[/(\d+)\s*Min\w*\s*AMRAP/i.exec(text),/(\d+)\s*Min\w*\s*EMOM/i.exec(text),/Time Cap:\s*(\d+)/i.exec(text),/(\d+)\s*Min/i.exec(after)];
    for (var di=0;di<durSrcs.length;di++){if(durSrcs[di]){duration=parseInt(durSrcs[di][1]);break;}}
    var ws=[]; var wm;
    var wre1=/(\d{2,3})\s*\/\s*\d{2,3}\s*(?:lb|BB)?/g;
    while((wm=wre1.exec(text))!==null) ws.push(parseInt(wm[1]));
    var wre2=/(\d{2,3})\s*(?:lb|BB)/g;
    while((wm=wre2.exec(text))!==null) ws.push(parseInt(wm[1]));
    var loads=ws.filter(function(w){return w>=10&&w<=400;});
    var weightMin=loads.length?Math.min.apply(null,loads):0;
    var weightMax=loads.length?Math.max.apply(null,loads):0;
    var movements=extractMovements(body);
    if (!movements.length) return null;
    var PARTNER_RE=/you\s+go\s*[\/\\]\s*i\s+(rest|hold|go)|partner\s+(1\s*:|2\s*:)/i;
    var partner=PARTNER_RE.test(text);
    return {id:uid(),name,type,duration,weightMin,weightMax,movements,description:body.replace(/\s+/g,' ').trim().slice(0,300),date:dateStr||'',partner};
  }

  function parseRows(rows) {
    var cols=Object.keys(rows[0]||{}).map(function(c){return c.toLowerCase();});
    var isWodify=cols.some(function(c){return c.includes('component')&&c.includes('detail');});
    if (isWodify) {
      var dk=Object.keys(rows[0]).find(function(c){return /component.*detail/i.test(c);});
      var dtk=Object.keys(rows[0]).find(function(c){return /date/i.test(c);});
      return {workouts:rows.map(function(r){return parseWodifyDetail(r[dk],dtk?r[dtk]:'');}).filter(Boolean),format:'Wodify export'};
    }
    function find(row){
      var keys=[].slice.call(arguments,1);
      for (var ki=0;ki<keys.length;ki++){var hit=Object.keys(row).find(function(c){return c.toLowerCase().replace(/\s+/g,'')===keys[ki].toLowerCase();});if(hit&&row[hit]!==undefined&&row[hit]!=='')return String(row[hit]);}
      return '';
    }
    var workouts=rows.map(function(row){
      var name=find(row,'name','workoutname','title','wod'); if(!name) return null;
      var descRaw=find(row,'description','notes','workout'); var movRaw=find(row,'movements','exercises');
      var movements=movRaw?String(movRaw).split(/[,;\/]/).map(function(s){return s.trim();}).filter(Boolean):[];
      var duration=parseNum(find(row,'duration','time','minutes','min'));
      var weightMin=parseNum(find(row,'weightmin','minweight','weight'));
      var weightMax=parseNum(find(row,'weightmax','maxweight'))||weightMin;
      var typeRaw=find(row,'type','workouttype','scheme');
      var type=['AMRAP','EMOM'].find(function(t){return typeRaw.toUpperCase().includes(t);})||'For Time';
      return {id:uid(),name,duration,movements,weightMin,weightMax,type,description:descRaw};
    }).filter(Boolean);
    return {workouts,format:'standard columns'};
  }

  function WodSearch() {
    var s = useState(null); var workouts=s[0]; var setWorkouts=s[1];
    var nq=useState(''); var nameQuery=nq[0]; var setNameQuery=nq[1];
    var sm=useState([]); var selectedMovements=sm[0]; var setSelectedMovements=sm[1];
    var sb=useState([]); var selectedBuckets=sb[0]; var setSelectedBuckets=sb[1];
    var po=useState(false); var partnerOnly=po[0]; var setPartnerOnly=po[1];
    var wr=useState([0,200]); var weightRange=wr[0]; var setWeightRange=wr[1];
    var ms=useState(''); var movementSearch=ms[0]; var setMovementSearch=ms[1];
    var ex=useState(null); var expandedId=ex[0]; var setExpandedId=ex[1];
    var af=useState(false); var showAddForm=af[0]; var setShowAddForm=af[1];
    var nw=useState({name:'',duration:'',movements:[],weightMin:'',weightMax:'',type:'For Time',description:''}); var newWorkout=nw[0]; var setNewWorkout=nw[1];
    var nmi=useState(''); var newMovementInput=nmi[0]; var setNewMovementInput=nmi[1];
    var is=useState(null); var importStatus=is[0]; var setImportStatus=is[1];
    var ss=useState('saved'); var saveStatus=ss[0]; var setSaveStatus=ss[1];
    var fileRef=useRef(); var saveTimer=useRef();

    useEffect(function(){
      storage.get(WOD_KEY).then(function(r){ setWorkouts(r?JSON.parse(r.value):SAMPLE_WORKOUTS); }).catch(function(){ setWorkouts(SAMPLE_WORKOUTS); });
    },[]);

    var persist=useCallback(function(data){
      clearTimeout(saveTimer.current); setSaveStatus('saving');
      saveTimer.current=setTimeout(function(){
        storage.set(WOD_KEY,JSON.stringify(data)).then(function(){setSaveStatus('saved');}).catch(function(){setSaveStatus('error');});
      },600);
    },[]);

    var updateWorkouts=useCallback(function(updater){
      setWorkouts(function(prev){ var next=typeof updater==='function'?updater(prev):updater; persist(next); return next; });
    },[persist]);

    var allMovements=useMemo(function(){return [...new Set((workouts||[]).flatMap(function(w){return w.movements;}))].sort();},[workouts]);
    var filteredMovements=allMovements.filter(function(m){return m.toLowerCase().includes(movementSearch.toLowerCase());});
    var filteredWorkouts=useMemo(function(){
      if(!workouts) return [];
      return workouts.filter(function(w){
        var nm=w.name.toLowerCase().includes(nameQuery.toLowerCase());
        var mm=selectedMovements.length===0||selectedMovements.every(function(m){return w.movements.includes(m);});
        var dm=selectedBuckets.length===0||selectedBuckets.some(function(bk){var b=BUCKETS.find(function(b){return b.key===bk;});return b&&b.test(w.duration);});
        var wm=w.weightMax===0?weightRange[0]===0:w.weightMax>=weightRange[0]&&w.weightMin<=weightRange[1];
        var pm=!partnerOnly||w.partner===true;
        return nm&&mm&&dm&&wm&&pm;
      });
    },[workouts,nameQuery,selectedMovements,selectedBuckets,weightRange,partnerOnly]);

    var toggleMovement=function(m){setSelectedMovements(function(p){return p.includes(m)?p.filter(function(x){return x!==m;}):[...p,m];});};
    var toggleBucket=function(k){setSelectedBuckets(function(p){return p.includes(k)?p.filter(function(x){return x!==k;}):[...p,k];});};
    var clearFilters=function(){setNameQuery('');setSelectedMovements([]);setSelectedBuckets([]);setPartnerOnly(false);setWeightRange([0,200]);setMovementSearch('');};
    var activeFilters=nameQuery||selectedMovements.length>0||selectedBuckets.length>0||partnerOnly||weightRange[0]>0||weightRange[1]<200;

    var addWorkout=function(){
      if(!newWorkout.name||!newWorkout.duration) return;
      var w={id:Date.now(),name:newWorkout.name,duration:parseNum(newWorkout.duration),movements:newWorkout.movements,weightMin:parseNum(newWorkout.weightMin),weightMax:parseNum(newWorkout.weightMax),type:newWorkout.type,description:newWorkout.description};
      updateWorkouts(function(p){return [...p,w];});
      setNewWorkout({name:'',duration:'',movements:[],weightMin:'',weightMax:'',type:'For Time',description:''});
      setShowAddForm(false);
    };

    var handleFile=function(e){
      var file=e.target.files&&e.target.files[0]; if(!file) return; setImportStatus(null);
      var reader=new FileReader();
      reader.onload=function(evt){
        try {
          var buf=evt.target.result; var wb=XLSX.read(buf,{type:'array'}); var ws=wb.Sheets[wb.SheetNames[0]]; var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
          if(!rows.length){setImportStatus({type:'error',msg:'Spreadsheet appears empty.'});return;}
          var parsed=parseRows(rows);
          if(!parsed.workouts.length){setImportStatus({type:'error',msg:'No workouts found.'});return;}
          updateWorkouts(function(prev){
            var existingNames=new Set(prev.map(function(w){return w.name.toLowerCase();})); var seen=new Set();
            var fresh=parsed.workouts.filter(function(w){var k=w.name.toLowerCase();if(existingNames.has(k)||seen.has(k))return false;seen.add(k);return true;});
            var dupes=parsed.workouts.length-fresh.length;
            setImportStatus({type:'success',msg:'Imported '+fresh.length+' workouts from '+parsed.format+(dupes?' ('+dupes+' duplicates skipped)':'')+'.'});
            return [...prev,...fresh];
          });
        } catch(err){setImportStatus({type:'error',msg:'Parse error: '+err.message});}
      };
      reader.readAsArrayBuffer(file); e.target.value='';
    };

    if(!workouts) return h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:C.textFaint,letterSpacing:'0.2em',textTransform:'uppercase'}},'Loading…');

    return h('div',{style:{display:'flex',flexDirection:'column',height:'100%'}},
      h('div',{style:{padding:'16px 20px 0',borderBottom:'1px solid '+C.line,flexShrink:0}},
        h('div',{style:{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:12}},
          h('div',null,
            h('div',{style:{fontSize:10,letterSpacing:'0.25em',color:C.accent,fontWeight:700,marginBottom:3}},'WOD LIBRARY'),
            h('h2',{style:{fontSize:26,fontWeight:900,lineHeight:1,letterSpacing:'-0.01em',textTransform:'uppercase'}},'CrossFit ',h('span',{style:{color:C.accent}},'Search'))
          ),
          h('div',{style:{display:'flex',flexDirection:'column',gap:6,alignItems:'flex-end'}},
            h('div',{style:{fontSize:10,letterSpacing:'0.12em',textTransform:'uppercase',color:saveStatus==='saved'?'#4F9D8C':saveStatus==='saving'?'#888':'#f44'}},saveStatus==='saved'?'✓ Saved':saveStatus==='saving'?'Saving…':'⚠ Error'),
            h('div',{style:{display:'flex',gap:6}},
              h('button',{className:'btn',onClick:function(){fileRef.current&&fileRef.current.click();},style:{background:C.navy3,color:C.text,padding:'6px 12px',fontWeight:700,fontSize:11,letterSpacing:'0.08em',textTransform:'uppercase',borderRadius:3,border:'1px solid '+C.line}},'⬆ Import'),
              h('input',{ref:fileRef,type:'file',accept:'.xlsx,.xls,.csv',style:{display:'none'},onChange:handleFile}),
              h('button',{className:'btn',onClick:function(){setShowAddForm(function(p){return !p;});},style:{background:showAddForm?'#222':C.accent,color:'#fff',padding:'6px 12px',fontWeight:700,fontSize:11,letterSpacing:'0.08em',textTransform:'uppercase',borderRadius:3}},showAddForm?'✕ Cancel':'+ Add WOD')
            )
          )
        ),
        h('input',{value:nameQuery,onChange:function(e){setNameQuery(e.target.value);},placeholder:'Search workouts…',style:{width:'100%',maxWidth:360,height:34,marginBottom:10,fontSize:13}}),
        importStatus&&h('div',{className:'fade-in',style:{marginBottom:10,padding:'7px 12px',borderRadius:4,background:importStatus.type==='success'?'#0a2a0a':'#2a0a0a',border:'1px solid '+(importStatus.type==='success'?'#2a6':'#a33'),color:importStatus.type==='success'?'#4d4':'#f88',fontSize:12,display:'flex',justifyContent:'space-between'}},
          h('span',null,importStatus.msg),h('span',{style:{cursor:'pointer'},onClick:function(){setImportStatus(null);}},'✕'))
      ),
      h('div',{style:{display:'flex',flex:1,overflow:'hidden'}},
        h('div',{className:'hide-mobile',style:{width:200,borderRight:'1px solid '+C.line,padding:'14px 10px',overflowY:'auto',background:C.navy,flexShrink:0}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
            h('span',{style:{fontSize:10,fontWeight:700,letterSpacing:'0.2em',color:C.textFaint,textTransform:'uppercase'}},'Filters'),
            activeFilters&&h('button',{className:'btn',onClick:clearFilters,style:{background:'none',color:C.accent,fontSize:11,fontWeight:700}},'Clear')
          ),
          h('div',{style:{marginBottom:16}},
            h('div',{style:{fontSize:10,fontWeight:700,letterSpacing:'0.15em',color:C.textDim,textTransform:'uppercase',marginBottom:8}},'Duration'),
            BUCKETS.map(function(b){
              var active=selectedBuckets.includes(b.key);
              return h('button',{key:b.key,className:'btn',onClick:function(){toggleBucket(b.key);},style:{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%',padding:'7px 9px',borderRadius:4,marginBottom:3,background:active?C.accent:C.navy2,border:'1px solid '+(active?C.accent:C.line),color:active?'#fff':C.text,fontFamily:'Glacial Indifference,Montserrat,sans-serif',textTransform:'uppercase'}},
                h('span',{style:{fontSize:12,fontWeight:700}},b.label),
                h('span',{style:{fontSize:10,color:active?'rgba(255,255,255,0.8)':C.textFaint}},b.sub));
            })
          ),
          h('div',{style:{marginBottom:16}},
            h('div',{style:{fontSize:10,fontWeight:700,letterSpacing:'0.15em',color:C.textDim,textTransform:'uppercase',marginBottom:8}},'Format'),
            h('button',{className:'btn',onClick:function(){setPartnerOnly(function(p){return !p;});},style:{display:'flex',justifyContent:'space-between',alignItems:'center',width:'100%',padding:'7px 9px',borderRadius:4,background:partnerOnly?C.accent:C.navy2,border:'1px solid '+(partnerOnly?C.accent:C.line),color:partnerOnly?'#fff':C.text,fontFamily:'Glacial Indifference,Montserrat,sans-serif',textTransform:'uppercase'}},
              h('span',{style:{fontSize:12,fontWeight:700}},'👥 Partner'))
          ),
          h('div',{style:{marginBottom:16}},

  function callClaude(messages,systemPrompt){
    var body={model:'claude-sonnet-4-6',max_tokens:1000,messages:messages};
    if(systemPrompt) body.system=systemPrompt;
    return fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},body:JSON.stringify(body)})
      .then(function(r){if(!r.ok)return r.json().then(function(e){throw new Error(e&&e.error&&e.error.message||'HTTP '+r.status);});return r.json();})
      .then(function(data){return data.content.map(function(b){return b.text||'';}).join('').trim();});
  }

  function formatSOPAsFlow(title,rawText){
    var sys='You are formatting SOPs for Vegvisir CrossFit gym. Return ONLY valid JSON, no markdown.\n\nFormat:\n{"summary":"One sentence","category":"Gym Overview|Maintenance|Cleaning & Supplies|Grounds|Equipment & Ordering|Sales & Member Ops|Coaching|Other","steps":[{"id":"1","type":"action","text":"What to do","next":"2"},{"id":"2","type":"decision","text":"Is X true?","yes":"3","no":"4"},{"id":"3","type":"end","text":"Done","next":null}]}\n\nTypes: action, decision, end, warning. Keep steps concise. 3-8 steps ideal.';
    return callClaude([{role:'user',content:'Title: "'+title+'"\n\nContent:\n'+rawText}],sys)
      .then(function(raw){
        try{return JSON.parse(raw.replace(/```json|```/g,'').trim());}
        catch(e){return {summary:rawText.slice(0,100),category:'Other',steps:[{id:'1',type:'action',text:rawText.slice(0,300),next:null}]};}
      });
  }

  function transcribeAudio(file){
    return new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result.split(',')[1]);};r.onerror=rej;r.readAsDataURL(file);})
      .then(function(b64){

      });
  }

  var PROXY='https://coach-dashboard-api.onrender.com';

  function Dashboard(){
    var cl=useState(null); var classes=cl[0]; var setClasses=cl[1];
    var dt=useState(null); var date=dt[0]; var setDate=dt[1];
    var er=useState(null); var error=er[0]; var setError=er[1];
    var ld=useState(true); var loading=ld[0]; var setLoading=ld[1];

    var al=useState(null); var allAthletes=al[0]; var setAllAthletes=al[1];
    var ra=useState(null); var rosterAthletes=ra[0]; var setRosterAthletes=ra[1];
    var rl=useState(false); var rosterLoading=rl[0]; var setRosterLoading=rl[1];
    var rc=useState(null); var rosterBuiltAt=rc[0]; var setRosterBuiltAt=rc[1];
    var rf=useState(false); var rosterFallback=rf[0]; var setRosterFallback=rf[1];

    var load=useCallback(function(){
      setLoading(true); setError(null); setSelectedClass(null); setRosterAthletes(null);
      fetch(PROXY+'/today-classes')
        .then(function(r){if(!r.ok)throw new Error('Server error '+r.status);return r.json();})
        .then(function(data){setClasses(data.classes||[]);setDate(data.date);setLastRefresh(new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}));})
        .catch(function(err){setError(err.message);})
        .then(function(){setLoading(false);});
    },[]);

    // Load all athletes once on mount
    useEffect(function(){
      load();
      fetch(PROXY+'/athletes')
        .then(function(r){return r.json();})
        .then(function(data){setAllAthletes(data.athletes||[]);})
        .catch(function(){setAllAthletes([]);});
    },[load]);

    var now=new Date(); var nowMins=now.getHours()*60+now.getMinutes();
    var classStatus=function(cls){
      if(!cls.start_time) return 'upcoming';
      var parts=cls.start_time.split(':'); var h=parseInt(parts[0]); var m=parseInt(parts[1]);
      var startMins=h*60+m; var endMins=startMins+60;
      if(nowMins>=startMins&&nowMins<endMins) return 'live';
      if(nowMins>=endMins) return 'done';
      return 'upcoming';
    };
    var fmtTime=function(t){
      if(!t) return ''; var parts=t.split(':'); var h=parseInt(parts[0]); var m=parseInt(parts[1]);
      var ampm=h>=12?'PM':'AM'; var h12=h>12?h-12:h===0?12:h;
      return h12+':'+(m<10?'0':'')+m+' '+ampm;
    };

    var handleSaveNote = function(rowNumber, newNote) {
      setAllAthletes(function(prev) {
        return (prev||[]).map(function(a) {
          return a.row_number === rowNumber ? Object.assign({}, a, {coach_notes: newNote}) : a;
        });
      });
    };

    // When a class is tapped, try roster cache first
    var selectClass = function(cls) {
      setSelectedClass(cls);
      setRosterAthletes(null);
      setRosterFallback(false);
      setRosterBuiltAt(null);
      setRosterLoading(true);
      fetch(PROXY+'/roster/'+cls.id)
        .then(function(r){ return r.json(); })
        .then(function(data) {
          if (data.error) {
            setRosterFallback(true);
          } else {
            var athletes = (data.athletes||[]).map(function(a) {
              var brief = a.coaching_brief;
              if (brief && typeof brief === 'string') { try { brief = JSON.parse(brief); } catch(e) {} }
              return Object.assign({}, a, { coaching_brief: brief });
            });
            setRosterAthletes(athletes);
            setRosterBuiltAt(data.cache_built_at||null);
          }
        })
        .catch(function() { setRosterFallback(true); })
        .then(function() { setRosterLoading(false); });
    };

    var enrichAthlete = function(a) {
      var brief = a.coaching_brief;
      if (brief && typeof brief === 'object') {
        return Object.assign({}, a, {
          injuries: brief.injuries || a.injuries || '',
          dos:      Array.isArray(brief.dos) ? brief.dos.join(', ') : (a.dos||''),
          donts:    Array.isArray(brief.donts) ? brief.donts.join(', ') : (a.donts||''),
          upcoming: brief.upcoming || a.upcoming || '',
        });
      }
      return a;
    };

    // Class detail view
    if (selectedClass) {
      var cls = selectedClass;
      var status = classStatus(cls);
      var totalRes = (cls.signed_in||0) + (cls.reserved||0);
      var coaches = cls.coaches&&cls.coaches.map(function(c){return c.coach;}).join(', ')||'—';

      var classAthletes;
      if (rosterLoading) {
        classAthletes = null;
      } else if (rosterAthletes) {
        classAthletes = rosterAthletes.filter(function(a){ return a.has_notes; }).map(enrichAthlete);
      } else {
        classAthletes = (allAthletes||[]).filter(function(a) {
          return a.goals||a.injuries||a.dos||a.donts||a.coach_notes||a.upcoming;
        });

      return h('div',{style:{display:'flex',flexDirection:'column',height:'100%',overflowY:'auto'}},
        h('div',{style:{padding:'14px 20px',borderBottom:'1px solid '+C.line,flexShrink:0,display:'flex',alignItems:'center',gap:12}},
          h('button',{className:'btn',onClick:function(){setSelectedClass(null);setRosterAthletes(null);},style:{background:C.navy3,color:C.text,padding:'6px 10px',fontWeight:700,fontSize:11,borderRadius:3,border:'1px solid '+C.line}},'← Back'),
          h('div',{style:{flex:1}},
            h('div',{style:{fontSize:10,letterSpacing:'0.2em',color:status==='live'?'#22C55E':C.accentHi,fontWeight:700,textTransform:'uppercase',marginBottom:2}},status==='live'?'● Live Now':fmtTime(cls.start_time)),
            h('div',{style:{fontSize:20,fontWeight:900,textTransform:'uppercase',letterSpacing:'0.02em'}},cls.name)
          ),
          h('div',{style:{display:'flex',gap:14,flexShrink:0}},
            h('div',{style:{textAlign:'center'}},h('div',{style:{fontSize:22,fontWeight:900,color:C.accentHi,lineHeight:1}},cls.signed_in||0),h('div',{style:{fontSize:8,color:C.textFaint,textTransform:'uppercase',letterSpacing:'0.1em'}},'Signed In')),
            h('div',{style:{textAlign:'center'}},h('div',{style:{fontSize:22,fontWeight:900,color:C.textDim,lineHeight:1}},cls.reserved||0),h('div',{style:{fontSize:8,color:C.textFaint,textTransform:'uppercase',letterSpacing:'0.1em'}},'Reserved'))
          )
        ),
        h('div',{style:{padding:'16px 20px',flex:1,overflowY:'auto'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
            h('div',{style:{fontSize:11,color:C.textFaint}},
              'Coach: ',h('span',{style:{color:C.text}},coaches),
              ' · ',h('span',{style:{color:C.accentHi}},totalRes),'/'+cls.class_limit+' spots'),
            rosterBuiltAt&&!rosterFallback&&h('div',{style:{fontSize:9,color:C.textFaint}},
              '🕐 '+new Date(rosterBuiltAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}))
          ),
          rosterFallback&&h('div',{style:{background:'rgba(201,168,76,0.08)',border:'1px solid rgba(201,168,76,0.2)',borderRadius:6,padding:'10px 14px',marginBottom:14,fontSize:11,color:C.gold}},
            '⏳ Roster cache not built yet — showing all athletes with notes. Builds automatically 15 min before each class.'),
          rosterLoading
            ? h('div',{style:{textAlign:'center',padding:'40px',color:C.textFaint,letterSpacing:'0.15em',textTransform:'uppercase',fontSize:11}},'Loading roster…')
            : classAthletes&&classAthletes.length===0

                  h('div',{style:{fontSize:13,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:6}},rosterAthletes?'No athletes with notes in this class':'No athlete notes yet'),

                  classAthletes&&h('div',{style:{fontSize:10,fontWeight:700,letterSpacing:'0.15em',textTransform:'uppercase',color:C.textFaint,marginBottom:12}},
                    (rosterAthletes?'':'All ')+classAthletes.length+' athlete'+(classAthletes.length===1?'':'s')+(rosterAthletes?' in this class':' with notes')),
                  (classAthletes||[]).map(function(a) {
                    return h(AthleteCard, {key:a.row_number||a.athlete, athlete:a, onSaveNote:handleSaveNote});
                  })
                )
        )
      );
    }

    // Class list view
    return h('div',{style:{display:'flex',flexDirection:'column',height:'100%',overflowY:'auto'}},
      h('div',{style:{padding:'16px 20px 0',borderBottom:'1px solid '+C.line,flexShrink:0,marginBottom:16}},
        h('div',{style:{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:12}},
          h('div',null,
            h('div',{style:{fontSize:10,letterSpacing:'0.25em',color:C.accentHi,fontWeight:700,marginBottom:3}},"TODAY'S SCHEDULE"),
            h('h2',{style:{fontSize:26,fontWeight:900,lineHeight:1,letterSpacing:'-0.01em',textTransform:'uppercase'}},'Coach ',h('span',{style:{color:C.accentHi}},'Dashboard'))
          ),
          h('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:5}},
            lastRefresh&&h('div',{style:{fontSize:10,color:C.textFaint,letterSpacing:'0.1em'}},'Updated '+lastRefresh),
            h('button',{className:'btn',onClick:load,style:{background:C.navy3,color:C.text,padding:'6px 12px',fontWeight:700,fontSize:11,letterSpacing:'0.08em',textTransform:'uppercase',borderRadius:3,border:'1px solid '+C.line}},'⟳ Refresh')
          )
        )
      ),
      h('div',{style:{padding:'0 20px 32px'}},
        loading&&h('div',{style:{textAlign:'center',padding:'50px',color:C.textFaint,letterSpacing:'0.2em',textTransform:'uppercase',fontSize:12}},'Loading classes…'),
        error&&h('div',{style:{background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:7,padding:'14px 18px',color:'#ef4444',fontSize:13}},
          '⚠ '+error+' — ',h('span',{style:{textDecoration:'underline',cursor:'pointer'},onClick:load},'Retry')),
        !loading&&!error&&classes&&h('div',null,
          h('div',{style:{fontSize:11,color:C.textFaint,marginBottom:14,letterSpacing:'0.05em'}},date+' · '+classes.length+' classes · tap a class to see athlete cards'),
          h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
            classes.map(function(cls,i){
              var status=classStatus(cls);
              var totalRes=(cls.signed_in||0)+(cls.reserved||0);
              var pct=cls.class_limit?Math.round(totalRes/cls.class_limit*100):0;
              var coaches=cls.coaches&&cls.coaches.map(function(c){return c.coach;}).join(', ')||'—';
              var barColor=pct>=90?'#ef4444':pct>=70?C.gold:C.accentHi;
              return h('div',{key:i,className:'card',style:{background:C.navy2,border:'1px solid '+(status==='live'?'rgba(34,197,94,0.3)':C.line),borderRadius:9,padding:'14px 18px',opacity:status==='done'?0.5:1,cursor:'pointer'},
                onClick:function(){selectClass(cls);}},
                h('div',{style:{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10}},
                  h('div',{style:{flex:1}},
                    h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:5}},
                      status==='live'&&h('span',{style:{width:7,height:7,borderRadius:'50%',background:'#22C55E',display:'inline-block',boxShadow:'0 0 6px #22C55E'}}),
                      h('span',{style:{fontSize:9,fontWeight:700,letterSpacing:'0.15em',color:status==='live'?'#22C55E':status==='done'?C.textFaint:C.text,textTransform:'uppercase'}},status==='live'?'● Live':status==='done'?'Done':'Upcoming')
                    ),
                    h('div',{style:{fontSize:20,fontWeight:900,textTransform:'uppercase',letterSpacing:'0.02em',marginBottom:3}},fmtTime(cls.start_time)),
                    h('div',{style:{fontSize:13,color:C.textDim,marginBottom:6}},cls.name),
                    h('div',{style:{fontSize:11,color:C.textFaint}},'Coach: ',h('span',{style:{color:C.text}},coaches))
                  ),
                  h('div',{style:{display:'flex',gap:16,flexShrink:0,alignItems:'center'}},
                    h('div',{style:{textAlign:'center'}},h('div',{style:{fontSize:24,fontWeight:900,color:C.accentHi,lineHeight:1}},cls.signed_in||0),h('div',{style:{fontSize:8,color:C.textFaint,textTransform:'uppercase',letterSpacing:'0.1em'}},'Signed In')),
                    h('div',{style:{textAlign:'center'}},h('div',{style:{fontSize:24,fontWeight:900,color:C.textDim,lineHeight:1}},cls.reserved||0),h('div',{style:{fontSize:8,color:C.textFaint,textTransform:'uppercase',letterSpacing:'0.1em'}},'Reserved')),
                    cls.waitlisted>0&&h('div',{style:{textAlign:'center'}},h('div',{style:{fontSize:24,fontWeight:900,color:C.gold,lineHeight:1}},cls.waitlisted),h('div',{style:{fontSize:8,color:C.textFaint,textTransform:'uppercase',letterSpacing:'0.1em'}},'Waitlist')),
                    h('div',{style:{color:C.textFaint,fontSize:16}},'›')
                  )
                ),
                cls.class_limit>0&&h('div',{style:{marginTop:10}},
                  h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:9,color:C.textFaint,marginBottom:3}},h('span',null,totalRes+' / '+cls.class_limit+' spots'),h('span',null,pct+'% full')),
                  h('div',{style:{background:C.navy,borderRadius:2,height:3,overflow:'hidden'}},h('div',{style:{height:'100%',borderRadius:2,width:pct+'%',background:barColor,transition:'width 0.5s'}}))
                )
              );
            })
          )
        )
      )
    );
  }

  // ══════════════════════════════════════════════════════
  // ROOT
  // ══════════════════════════════════════════════════════

  var TABS=[{id:'dashboard',label:'Dashboard',icon:'📅'},{id:'wods',label:'WOD Search',icon:'🏋️'},{id:'playbook',label:'Playbook',icon:'📋'}];

  function App(){
    var ts=useState('dashboard'); var tab=ts[0]; var setTab=ts[1];
    return h('div',{style:{height:'100vh',display:'flex',flexDirection:'column',background:C.bg,fontFamily:"'Glacial Indifference','Montserrat',sans-serif",color:C.text}},
      h('div',{style:{background:C.navy,borderBottom:'1px solid '+C.line,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 20px',height:50}},
        h('div',{style:{display:'flex',alignItems:'center',gap:9}},
          h('svg',{width:26,height:26,viewBox:'0 0 100 100'},
            h('polygon',{points:'50,3 97,26 97,74 50,97 3,74 3,26',fill:'none',stroke:'#3E6E8E',strokeWidth:6}),
            h('text',{x:50,y:67,textAnchor:'middle',fontSize:44,fontWeight:900,fill:'#EAEFF3',fontFamily:'Glacial Indifference,Montserrat,sans-serif'},'V')
          ),
          h('span',{className:'hide-mobile',style:{fontSize:12,fontWeight:800,letterSpacing:'0.15em',textTransform:'uppercase',color:C.text}},'Vegvisir')
        ),
        h('div',{style:{display:'flex',gap:3}},
          TABS.map(function(t){
            return h('button',{key:t.id,className:'btn',onClick:function(){setTab(t.id);},style:{padding:'5px 12px',borderRadius:4,background:tab===t.id?C.navy3:'none',border:'1px solid '+(tab===t.id?C.line:'transparent'),color:tab===t.id?C.text:C.textFaint,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',display:'flex',alignItems:'center',gap:5}},
              h('span',null,t.icon),h('span',{className:'hide-mobile'},t.label));
          })
        ),
        h('div',{style:{width:70}})
      ),
      h('div',{style:{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}},
        tab==='dashboard'&&h(Dashboard),
        tab==='wods'&&h(WodSearch),
        tab==='playbook'&&h(Playbook)
      )
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(h(App));
})();
</script>
</body>
</html>
